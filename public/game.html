<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO - Jeu</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="game-page-v2">
    <div class="game-shell-v2">
        <header class="game-header-v2">
            <h1 class="game-title-v2">UNO</h1>
            <p id="welcomeMessage" class="game-welcome-v2"></p>
        </header>

        <main class="game-board game-board-v2">
            <section class="opponent-zone opponent-zone-v2">
                <h2 id="opponentName" class="zone-title-v2">Adversaire</h2>
                <div id="opponentCards" class="cards-container cards-opponent-v2"></div>
            </section>

            <section class="center-zone center-zone-v2">
                <div class="pile-block pile-block-v2">
                    <h3>Carte centrale</h3>
                    <div id="discardPile" class="pile pile-v2"></div>
                    <p id="activeColor" class="active-color-v2"></p>
                </div>

                <div class="pile-block pile-block-v2">
                    <h3>Pioche</h3>
                    <div id="drawPile" class="pile pile-v2"></div>
                </div>
            </section>

            <section class="action-buttons action-buttons-v2">
                <button id="unoButton">UNO</button>
                <button id="challengeUnoButton">Contre UNO</button>
            </section>

            <section class="player-zone player-zone-v2">
                <h2 class="zone-title-v2">Ta main</h2>
                <div id="playerCards" class="cards-container cards-player-v2"></div>
            </section>
        </main>
    </div>

    <div id="colorPickerModal" class="color-picker-modal hidden">
    <div class="color-picker-box">
        <h3>Choisis une couleur</h3>
        <div class="color-picker-buttons">
            <button class="color-choice blue" data-color="bleus">Bleu</button>
            <button class="color-choice red" data-color="rouges">Rouge</button>
            <button class="color-choice green" data-color="verts">Vert</button>
            <button class="color-choice yellow" data-color="jaunes">Jaune</button>
        </div>
    </div>
</div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
