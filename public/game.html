<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>UNO</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h1>UNO</h1>
    <p id="welcomeMessage"></p>

    <div class="game-container">

        <!-- Adversaire -->
        <div class="opponent">
            <h2>Adversaire</h2>
            <div id="opponentCards">Cartes: 7</div>
        </div>

        <!-- Centre -->
        <div class="center">
            <div id="discardPile">Carte centrale</div>
            <div id="drawPile">Pioche</div>
        </div>

        <!-- Joueur -->
        <div class="player">
            <h2>Ta main</h2>
            <div id="playerCards"></div>
        </div>

        <!-- Message -->
        <div id="gameMessage"></div>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/game.js"></script>

</body>
</html>
