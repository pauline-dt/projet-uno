<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - UNO</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page-v2">

    <div class="login-container-v2">
        <div class="login-badge-v2">ACCÈS JOUEUR</div>

        <h1 class="login-title-v2">Connexion</h1>
        <p class="login-subtitle-v2">
            Entre ton pseudo pour rejoindre une partie de UNO en temps réel.
        </p>

        <form id="loginForm" class="login-form-v2">
            <input
                type="text"
                id="pseudo"
                placeholder="Ton pseudo"
                required
                maxlength="20"
                class="login-input-v2"
            >
            <button type="submit" class="login-button-v2">
                Entrer dans la partie
            </button>
        </form>

        <div class="login-cards-preview-v2">
            <img src="assets/cards/UNO_jaunes/7 Jaune.png" alt="Carte jaune" class="login-preview-card-v2 card-left-v2">
            <img src="assets/cards/UNO_others/Change couleur.png" alt="Carte joker" class="login-preview-card-v2 card-center-v2">
            <img src="assets/cards/UNO_rouges/+2 Rouge.png" alt="Carte rouge" class="login-preview-card-v2 card-right-v2">
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
